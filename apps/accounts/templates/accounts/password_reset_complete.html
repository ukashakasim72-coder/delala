{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete - Digital Delala{% endblock %}

    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <h2 class="text-3xl font-extrabold text-gray-900">Password Reset Complete</h2>
        <p class="mt-4 text-lg text-gray-700">Your password has been reset successfully. You can now log in with your new password.</p>

    </div>

{% endblock %}
