<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Digital Delala</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Green Button – unchanged */
        .btn-green {
            background-color: #1DBF73;
            color: white;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-green:hover {
            background-color: #16a363;
        }
        /* Input styling – unchanged */
        .form-input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background-color: #f9fafb;
            margin-top: 4px;
            margin-bottom: 16px;
        }
        label {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }
        /* Extra small screen tweaks */
        @media (max-width: 480px) {
            .btn-green {
                padding: 12px;
                font-size: 16px;
            }
            .form-input-field {
                padding: 10px;
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen px-4 py-6">

    <!-- Logo – responsive centering & spacing -->
    <div class="flex items-center space-x-2 mb-4">
        <div class="bg-[#1DBF73] rounded-full p-1">
            <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
            </svg>
        </div>
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">Digital Delala</h1>
    </div>

    <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 text-center">Reset password</h2>
    <p class="text-gray-500 text-sm mb-6 sm:mb-8 text-center">Enter code and new password</p>

    <!-- Card – fluid width, responsive padding -->
    <div class="bg-white p-6 sm:p-10 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md mx-auto">
        <form method="POST">
            {% csrf_token %}

            <div>
                <label>Verification code</label>
                {{ form.verification_code }}
            </div>

            <div>
                <label>New password</label>
                {{ form.new_password }}
            </div>

            <div>
                <label>Confirm password</label>
                {{ form.confirm_password }}
            </div>

            <!-- button unchanged, but full width already -->
            <button type="submit" class="btn-green mt-4">
                Reset
            </button>
        </form>
    </div>

    <!-- Footer – responsive text size & padding -->
    <div class="mt-12 sm:mt-20 text-center text-xs text-gray-400 px-2">
        <p>2026 @ Copy right digital delala. All rights reserved &nbsp;
           <a href="#" class="text-[#1DBF73] hover:underline">Privacy policy</a>
        </p>
    </div>

</body>
</html>
