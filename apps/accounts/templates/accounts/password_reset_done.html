{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Sent - Digital Delala{% endblock %}

{% block content %}
<div class="min-h-full flex flex-col justify-center py-12 px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <h2 class="text-3xl font-extrabold text-gray-900">Check your email</h2>
        <p class="mt-4 text-lg text-gray-700">We've sent a password reset code to your email address. Please check your inbox (and spam folder).</p>
        <div class="mt-6">
            <a href="{% url 'login' %}" class="text-digital-green hover:text-green-700 font-medium">Go to Login</a>
        </div>
    </div>
</div>
{% endblock %}
