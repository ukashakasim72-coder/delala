{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Digital Delala{% endblock %}

{% block content %}

    <!-- Header Section -->
    <div class="text-center">
        <div class="flex justify-center mb-4">
            <!-- Using a standard icon since the SVG path might vary -->
            <div class="text-[#1DBF73] text-5xl">
                <i class="fa-solid fa-circle-nodes"></i>
            </div>
        </div>
        <h2 class="text-4xl font-black text-[#0B1C3F] tracking-tight"> Delala Link</h2>
        <p class="mt-3 text-xl text-gray-500 font-medium">Welcome Back</p>
        <p class="mt-1 text-sm text-gray-400">Enter your email and password to access your account</p>
    </div>

    <!-- The Actual Login Form -->
    <form method="POST" class="mt-8 space-y-6">
        {% csrf_token %}

        <!-- Email & Password Card (Light Blue Background) -->
        <div class="bg-[#F1F1F1] rounded-2xl p-6 border border-blue-50">
            <!-- Email Field -->
            <div class="mb-5">
                <label for="id_email" class="block text-sm font-bold text-[#0B1C3F] mb-2 ml-1">Email address</label>
                <input type="email" name="email" id="id_email"
                       class="w-full px-4 py-1.5 bg-[#FFFFFF] border border-transparent rounded-xl focus:ring-2 focus:ring-[#1DBF73] focus:border-transparent outline-none transition-all shadow-sm"
                       placeholder="Enter your Email address" required>
            </div>

            <!-- Password Field -->
            <div>
                <label for="id_password" class="block text-sm font-bold text-[#0B1C3F] mb-2 ml-1">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="id_password"
                           class="w-full px-4 py-1.5 border border-transparent rounded-xl focus:ring-2 focus:ring-[#1DBF73] focus:border-transparent outline-none transition-all shadow-sm pr-12"
                           placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword('id_password')"
                                                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-xl hover:scale-110 transition-transform">
                        👁️
                    </button>
                </div>
            </div>
        </div>

        <!-- Remember me & Forgot Password Row -->
        <div class="flex items-center justify-between px-1">
            <div class="flex items-center">
                <input id="remember_me" name="remember_me" type="checkbox"
                       class="h-5 w-5 rounded border-gray-300 text-[#1DBF73] focus:ring-[#1DBF73] cursor-pointer"
                       style="accent-color: #1DBF73;">
                <label for="remember_me" class="ml-2 block text-sm text-gray-500 font-medium cursor-pointer">Remember me</label>
            </div>
            <div class="text-sm">
                <a href="{% url 'forgot_password' %}" class="font-bold text-[#E25C5C] hover:text-red-700 transition-colors">
                    Forgot your password?
                </a>
            </div>
        </div>

        <!-- Big Green Sign In Button -->
        <div class="pt-2">
            <button type="submit"
                    class="w-full bg-[#1DBF73] hover:bg-[#19a362] text-white font-bold py-3 rounded-2xl shadow-lg bg-green-500 transition-all text-xl border-2 border-[#1DBF73]">
                Sign in
            </button>
        </div>
    </form>
<script>
    function togglePassword(id) {
        var x = document.getElementById(id);
        if (x.type === "password") {
            x.type = "text";
        } else {
            x.type = "password";
        }
    }
</script>
{% endblock %}
