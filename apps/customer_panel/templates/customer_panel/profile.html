{% extends 'customer_panel/base.html' %}
{% block title %}Profile - Digital Delala{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <div class="flex justify-between items-start mb-4">
            <h2 class="text-base font-bold text-gray-800">Edit profile</h2>
            <a href="{% url 'customer_panel:logout' %}"
               class="text-red-500 hover:text-red-500 text-sm font-medium flex items-center gap-1"
               onclick="return confirm('Are you sure you want to logout?');">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>

        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}

            <!-- Avatar upload -->
            <div class="flex justify-end mb-2">
                <div class="relative">
                    {% if profile.avatar %}
                        <img src="{{ profile.avatar.url }}" id="avatarPreview"
                             class="w-20 h-20 rounded-full object-cover border-2 border-green-400">
                    {% else %}
                        <div id="avatarPlaceholder"
                             class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center text-green-600 text-2xl font-bold border-2 border-green-300">
                            {{ user.email|first|upper }}
                        </div>
                    {% endif %}
                    <label for="avatarInput"
                           class="absolute bottom-0 right-0 w-6 h-6 bg-green-500 rounded-full flex items-center justify-center cursor-pointer shadow">
                        <i class="fas fa-camera text-white text-xs"></i>
                    </label>
                    <input type="file" id="avatarInput" name="avatar" accept="image/*" class="hidden"
                           onchange="previewAvatar(this)">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Full Name -->
                <div>
                    <label class="block text-lg font-medium text-gray-500 mb-1">Full Name <span class="text-red-500 text-lg">*</span></label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-300">
                            <i class="fas fa-user text-xs"></i>
                        </span>
                        <input type="text" name="full_name" value="{{ full_name }}"
                               placeholder="Enter full name"
                               class="w-full pl-8 pr-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-400 outline-none">
                    </div>
                </div>

                <!-- Password (display only + change link) -->
                <div>
                    <label class="block text-lg font-medium text-gray-500 mb-1">Password <span class="text-red-500 text-lg">*</span></label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-300">
                            <i class="fas fa-lock text-xs"></i>
                        </span>
                        <input type="password" placeholder="••••••••" disabled
                               class="w-full pl-8 pr-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50">
                    </div>
                    <a href="{% url 'customer_panel:change_password' %}"
                       class="text-sm text-green-500 mt-1 inline-block hover:underline">
                        Change password
                    </a>
                </div>

                <!-- Location -->
                <div>
                    <label class="block text-lg font-medium text-gray-500 mb-1">Location <span class="text-red-500 text-lg">*</span></label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-300">
                            <i class="fas fa-location-dot text-xs"></i>
                        </span>
                        <input type="text" name="location" value="{{ profile.location }}"
                               placeholder="Add location"
                               class="w-full pl-8 pr-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-400 outline-none">
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex gap-3 pt-2">
                <a href="{% url 'customer_panel:home' %}"
                   class="flex-1 py-3 bg-white border border-gray-200 text-gray-500 rounded-xl text-sm font-semibold text-center hover:bg-gray-50 transition">
                    Back to Home
                </a>
                <button type="submit"
                        class="flex-1 py-3 bg-green-500 text-white rounded-xl text-sm font-bold hover:bg-green-600 transition">
                    Save Change
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function previewAvatar(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const placeholder = document.getElementById('avatarPlaceholder');
            const existing = document.getElementById('avatarPreview');
            if (existing) {
                existing.src = e.target.result;
            } else if (placeholder) {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.id = 'avatarPreview';
                img.className = 'w-20 h-20 rounded-full object-cover border-2 border-green-400';
                placeholder.parentNode.replaceChild(img, placeholder);
            }
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
