<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reset Password - Digital Delala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f5f4f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        input:focus { outline: none; }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-md mx-auto px-5 pt-14 pb-16">

    <!-- Header -->
    <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-gray-900">Reset Password</h2>
        <p class="text-sm text-gray-500 mt-1">Enter the code and your new password</p>
    </div>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm
            {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="post" class="space-y-5">
        {% csrf_token %}
        <input type="hidden" name="email" value="{{ email }}">

        <!-- Verification Code -->
        <div>
            <label class="block text-gray-900 font-bold text-base mb-2">
                Verification Code <span class="text-red-500">*</span>
            </label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                    <i class="fas fa-key"></i>
                </span>
                <input type="text"
                       name="code"
                       placeholder="Enter 6-digit code"
                       class="w-full border border-gray-200 rounded-2xl pl-11 pr-5 py-4 text-base text-gray-700 placeholder-gray-400 bg-white focus:border-green-400 focus:ring-2 focus:ring-green-100 transition">
            </div>
        </div>

        <!-- New Password -->
        <div>
            <label class="block text-gray-900 font-bold text-base mb-2">
                New Password <span class="text-red-500">*</span>
            </label>
            <div class="relative">
                <input type="password"
                       name="new_password"
                       id="new_password"
                       placeholder="At least 8 characters"
                       class="w-full border border-gray-200 rounded-2xl px-5 py-4 text-base text-gray-700 placeholder-gray-400 bg-white pr-14 focus:border-green-400 focus:ring-2 focus:ring-green-100 transition">
                <button type="button"
                        onclick="togglePwd('new_password', 'eye_new')"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                    <i id="eye_new" class="fas fa-eye-slash text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Confirm Password -->
        <div>
            <label class="block text-gray-900 font-bold text-base mb-2">
                Confirm Password <span class="text-red-500">*</span>
            </label>
            <div class="relative">
                <input type="password"
                       name="confirm_password"
                       id="confirm_password"
                       placeholder="Re-enter new password"
                       class="w-full border border-gray-200 rounded-2xl px-5 py-4 text-base text-gray-700 placeholder-gray-400 bg-white pr-14 focus:border-green-400 focus:ring-2 focus:ring-green-100 transition">
                <button type="button"
                        onclick="togglePwd('confirm_password', 'eye_confirm')"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                    <i id="eye_confirm" class="fas fa-eye-slash text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Submit button -->
        <div class="pt-1">
            <button type="submit"
                    class="w-full bg-[#1DBF73] hover:bg-[#19a362] active:bg-[#158f56] text-white font-bold text-lg py-4 rounded-full transition-all duration-200 active:scale-95 shadow-sm">
                Reset Password
            </button>
        </div>
    </form>

    <!-- Back to login -->
    <p class="text-center text-sm text-gray-500 mt-6">
        Remember your password?
        <a href="{% url 'customer_panel:login' %}" class="text-[#1DBF73] font-bold hover:underline">Sign In</a>
    </p>
</div>

<script>
function togglePwd(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    }
}
</script>

</body>
</html>
