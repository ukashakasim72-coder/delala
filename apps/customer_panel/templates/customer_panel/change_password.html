{% extends 'customer_panel/base.html' %}
{% block title %}Change Password - Digital Delala{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-6">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">

        <!-- Header -->
        <div class="flex items-center gap-3 mb-6">
            <a href="{% url 'customer_panel:profile' %}"
               class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 transition">
                <i class="fas fa-arrow-left text-sm"></i>
            </a>
            <h2 class="text-base font-bold text-gray-800">Change Password</h2>
        </div>

        <!-- Success / Error messages -->
        {% if messages %}
            {% for message in messages %}
            <div class="mb-4 px-4 py-3 rounded-xl text-sm
                {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-200
                {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
                <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %} mr-2"></i>
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <!-- Old Password -->
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">
                    Old Password <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-300">
                        <i class="fas fa-lock text-xs"></i>
                    </span>
                    <input type="password" name="old_password" id="old_password"
                           placeholder="Enter current password" required
                           class="w-full pl-9 pr-10 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-400 outline-none">
                    <button type="button" onclick="togglePassword('old_password', this)"
                            class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- New Password -->
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">
                    New Password <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-300">
                        <i class="fas fa-lock text-xs"></i>
                    </span>
                    <input type="password" name="new_password" id="new_password"
                           placeholder="Enter new password (min 8 characters)" required
                           class="w-full pl-9 pr-10 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-400 outline-none">
                    <button type="button" onclick="togglePassword('new_password', this)"
                            class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm New Password -->
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">
                    Confirm New Password <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-300">
                        <i class="fas fa-lock text-xs"></i>
                    </span>
                    <input type="password" name="confirm_password" id="confirm_password"
                           placeholder="Re-enter new password" required
                           class="w-full pl-9 pr-10 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-400 outline-none">
                    <button type="button" onclick="togglePassword('confirm_password', this)"
                            class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex gap-3 pt-2">
                <a href="{% url 'customer_panel:profile' %}"
                   class="flex-1 py-3 bg-white border border-gray-200 text-gray-500 rounded-xl text-sm font-semibold text-center hover:bg-gray-50 transition">
                    Cancel
                </a>
                <button type="submit"
                        class="flex-1 py-3 bg-green-500 text-white rounded-xl text-sm font-bold hover:bg-green-600 transition">
                    Update Password
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
