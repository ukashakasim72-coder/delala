
{% extends 'admin_panel/base.html' %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">{% if agent %}Edit Agent{% else %}Create Agent{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    <div class="mb-4">
        <label class="block text-gray-700 mb-2">Email</label>
        <input type="email" name="email" value="{{ agent.email }}" required class="w-full border rounded px-3 py-2">
    </div>
    <div class="mb-4">
        <label class="block text-gray-700 mb-2">Phone</label>
        <input type="text" name="phone" value="{{ agent.phone_number }}" class="w-full border rounded px-3 py-2">
    </div>
    <div class="mb-4">
        <label class="block text-gray-700 mb-2">{% if agent %}New password (leave empty to keep){% else %}Password{% endif %}</label>
        <input type="password" name="new_password" class="w-full border rounded px-3 py-2">
    </div>
    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Save</button>
    <a href="{% url 'admin_panel:agent_list' %}" class="ml-2 bg-gray-300 px-4 py-2 rounded">Cancel</a>
</form>
{% endblock %}
