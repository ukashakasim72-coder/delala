{% extends 'adminbase.html' %}
{% load static %}

{% block title %}Forgot Password - Admin{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <h2 class="text-3xl font-bold text-center text-gray-800">Forgot password</h2>
        <p class="text-center text-gray-500 mt-1">Reset your password</p>

        <form method="post" class="mt-8 space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-gray-700 font-medium mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-green-500 focus:border-green-500"
                       placeholder="example@gmail.com">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">Verification code</label>
                <input type="text" name="code" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-green-500 focus:border-green-500"
                       placeholder="Enter 6‑digit code">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">New password</label>
                <input type="password" name="new_password" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-green-500 focus:border-green-500"
                       placeholder="••••••••">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">Confirm password</label>
                <input type="password" name="confirm_password" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-green-500 focus:border-green-500"
                       placeholder="••••••••">
            </div>

            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">
                Reset
            </button>
        </form>

        <div class="mt-6 text-center text-xs text-gray-400">
            <p>2026 © Copy right digital delala. All rights are reserved</p>
            <a href="#" class="mt-1 inline-block text-green-600 hover:underline">Privacy policy</a>
        </div>
    </div>
</div>
{% endblock %}
