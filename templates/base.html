{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Digital Delala{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white-500 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-wrap items-center justify-between py-3 gap-3">
                <!-- Logo -->
                <div class="text-xl font-bold text-gray-800 tracking-tight">
                    <img src="{% static 'images/delala_link_logo.png' %}" alt="Digital Delala" class="h-10 w-auto">
                </div>

                <!-- Right side: navigation + profile -->
                <div class="flex flex-wrap items-center gap-4 sm:gap-6">
                    <div class="flex gap-1 sm:gap-2">
                        <a href="{% url 'dashboard' %}"
                           class="px-3 py-1.5 rounded-lg text-sm font-medium transition
                                  {% if request.resolver_match.url_name == 'dashboard' %}
                                      bg-green-500 text-white
                                  {% else %}
                                      text-gray-700 hover:bg-green-700 hover:text-white
                                  {% endif %}">
                            <i class="fas fa-home mr-1"></i> Home
                        </a>
                        <a href="{% url 'add_property' %}"
                           class="px-3 py-1.5 rounded-lg text-sm font-medium transition inline-flex items-center gap-1
                                  {% if request.resolver_match.url_name == 'add_property' %}
                                      bg-green-500 text-white
                                  {% else %}
                                      text-gray-700 hover:bg-green-700 hover:text-white
                                  {% endif %}">
                            <i class="fas fa-plus text-sm"></i> Add
                        </a>
                        <a href="{% url 'listing' %}"
                           class="px-3 py-1.5 rounded-lg text-sm font-medium transition inline-flex items-center gap-1
                                  {% if request.resolver_match.url_name == 'listing' %}
                                      bg-green-500 text-white
                                  {% else %}
                                      text-gray-700 hover:bg-green-700 hover:text-white
                                  {% endif %}">
                            <i class="fas fa-list text-sm"></i> My Listings
                        </a>
                    </div>

                    <!-- Profile image -->
                    <a href="{% url 'profile' %}" class="flex-shrink-0">
                        <div class="w-9 h-9 rounded-full bg-gray-300 flex items-center justify-center text-gray-700 font-bold overflow-hidden border-2 border-transparent hover:border-green-500 transition">
                            {% if user.profile.avatar %}
                                <img src="{{ user.profile.avatar.url }}" alt="Profile" class="w-full h-full object-cover">
                            {% else %}
                                <i class="fas fa-user text-gray-500 text-lg"></i>
                            {% endif %}
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-wrap justify-between items-center gap-6">
                <a href="https://play.google.com/store/apps/details?id=YOUR_APP_PACKAGE_NAME"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="flex items-center gap-2 hover:opacity-80 transition">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
                         alt="Get it on Google Play" class="h-10">
                </a>
                <div class="flex gap-6">
                    <a href="#" class="text-green-500 hover:text-green-500 text-sm">Terms of Services</a>
                    <a href="#" class="text-green-500 hover:text-green-500 text-sm">Privacy policy</a>
                </div>
            </div>
            <div class="mt-8 text-center text-sm text-gray-500">
                {% now "Y" %} © Delala link. All rights reserved.
            </div>
        </div>
    </footer>

</body>
</html>
