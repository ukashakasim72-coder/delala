{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Digital Delala{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-800">

    <!-- Header / Navigation -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <img src="{% static 'images/delala_link_logo.png' %}" alt="Digital Delala" class="h-10 w-auto">
            </div>
            <nav class="flex gap-6">
                <a href="#" class="text-gray-600 hover:text-green-600 font-medium">Home</a>
                <a href="#" class="text-gray-600 hover:text-green-600 font-medium">About</a>
                <a href="#" class="text-gray-600 hover:text-green-600 font-medium">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <!-- Search bar section -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="bg-white rounded-xl shadow-md p-4">
                <div class="flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Search by place or location</label>
                        <input type="text" placeholder="e.g., Bole, Addis Ababa"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div class="flex gap-2">
                        <button class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">All</button>
                        <button class="px-4 py-2 border border-green-600 text-green-600 rounded-lg hover:bg-green-50">For Rent</button>
                        <button class="px-4 py-2 border border-green-600 text-green-600 rounded-lg hover:bg-green-50">For Sales</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main content block -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-wrap justify-between items-center gap-6">
                <div class="flex items-center gap-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_2022_logo.svg/120px-Google_Play_2022_logo.svg.png" alt="Google Play" class="h-8">
                    <span class="text-gray-600">GET IT ON Google Play</span>
                </div>
                <div class="flex gap-6">
                    <a href="#" class="text-gray-500 hover:text-green-600 text-sm">Terms of Services</a>
                    <a href="#" class="text-green-500 hover:text-green-600 text-sm">Privacy policy</a>
                </div>
            </div>
            <div class="mt-8 text-center text-sm text-gray-500">
                {% now "Y" %} © Delala link. All rights reserved.
                <a href="#" class="ml-4 font-medium text-digital-green hover:text-green-700">Privacy Policy</a>
            </div>
        </div>
    </footer>

</body>
</html>
